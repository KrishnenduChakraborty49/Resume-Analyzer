<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <style>
        @page { margin: 0.8in; }
        body { font-family: 'Arial', sans-serif; line-height: 1.5; color: #333; font-size: 11pt; }
        .header { text-align: center; margin-bottom: 20px; border-bottom: 2px solid #000; padding-bottom: 10px; }
        h1 { margin: 0; text-transform: uppercase; font-size: 22pt; }
        h2 { border-bottom: 1px solid #999; text-transform: uppercase; font-size: 14pt; margin-top: 20px; color: #2c3e50; }
        .section { margin-bottom: 15px; }
        ul { padding-left: 20px; }
        /* This class will hold the converted Markdown HTML */
        .markdown-content { margin-top: 10px; }
    </style>
</head>
<body>
<div class="header">
    <h1>RESUME</h1>
    <p>Email: candidate@example.com | Phone: +91 0000000000</p>
</div>

<div class="section">
    <h2>Professional Summary</h2>
    <p th:text="${analysis.positiveSummaryForCandidate}"></p>
</div>

<div class="section">
    <h2>Technical Skills</h2>
    <p><strong>Technologies:</strong> <span th:text="${#strings.listJoin(analysis.recommendedTechnologies, ', ')}"></span></p>
</div>

<div class="section">
    <h2>Experience & Projects</h2>
    <div class="markdown-content" th:utext="${improvedContentHtml}"></div>
</div>
</body>
</html>
