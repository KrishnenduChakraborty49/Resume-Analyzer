# Server properties
server.port=${PORT:8081}

# Database Configuration (Shared Render PostgreSQL with Schema isolation)
# Note: Added ?currentSchema=resume_analyzer to prevent ritual data conflicts
spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/resume_db?currentSchema=resume_analyzer}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:chakraborty@123}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.default_schema=resume_analyzer

# Multipart file upload settings
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=15MB
spring.servlet.multipart.max-request-size=20MB

# Ollama AI Configuration (Local Development)
ollama.base-url=${OLLAMA_BASE_URL:http://localhost:11434}
ollama.model=${OLLAMA_MODEL:qwen2.5:7b}
ollama.embed-model=${OLLAMA_EMBED_MODEL:mxbai-embed-large}

# Groq Configuration for Resume Extraction (Secure)
# IMPORTANT: Put your GROQ_API_KEY in the Render Environment Variables!
groq.api.key=${GROQ_API_KEY:REPLACE_WITH_YOUR_KEY}
groq.model=${GROQ_MODEL:llama-3.1-70b-versatile}

